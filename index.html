<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Private Portal</title>
    <style>
        body { background: #121212; color: #eee; font-family: sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding-top: 50px; }
        #login-box { width: 90%; max-width: 600px; }
        form { border: 1px solid #333; padding: 2rem; border-radius: 8px; background: #1e1e1e; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; border: none; color: white; cursor: pointer; border-radius: 4px; margin-bottom: 10px; }
        button:hover { background: #0056b3; }
        .file-link { color: #00bcff; text-decoration: none; font-size: 1.2rem; cursor: pointer; display: block; padding: 10px; border-bottom: 1px solid #333; }
        .file-link:hover { background: #222; }
    </style>
</head>
<body>
    <div id="login-box">
        <div id="auth-area">
            <form id="loginForm">
                <h2 style="text-align: center;">Secure Access</h2>
                <input type="text" id="user" placeholder="Username" required>
                <input type="password" id="pass" placeholder="Password" required>
                <button type="submit">Access Files</button>
            </form>
        </div>
        
        <div id="display-area" style="display:none;">
            <div id="list-container"></div>
            <div id="file-viewer" style="display:none;"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://1bc2-174-95-0-54.ngrok-free.app";

        // 1. Handle Login and List Fetching
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            await fetchList();
        };

        async function fetchList() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ u, p })
                });

                if (res.status === 200) {
                    const data = await res.text();
                    document.getElementById('auth-area').style.display = 'none';
                    document.getElementById('display-area').style.display = 'block';
                    document.getElementById('list-container').innerHTML = data;
                    document.getElementById('list-container').style.display = 'block';
                    document.getElementById('file-viewer').style.display = 'none';
                } else {
                    alert("Access Denied");
                }
            } catch (err) {
                alert("Server not reachable. Check ngrok.");
            }
        }

        // 2. Handle Individual File Fetching
        async function loadFile(fileName) {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ u, p, file: fileName })
            });

            if (res.status === 200) {
                const data = await res.text();
                document.getElementById('list-container').style.display = 'none';
                const viewer = document.getElementById('file-viewer');
                viewer.innerHTML = data;
                viewer.style.display = 'block';
            }
        }

        // 3. Handle the "Back" button (called from the HTML injected by the server)
        function fetchListFromViewer() {
            document.getElementById('file-viewer').style.display = 'none';
            document.getElementById('list-container').style.display = 'block';
        }
    </script>
</body>
</html>
