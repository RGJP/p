<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Vault</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; margin: 0; }
        #container { width: 100%; max-width: 500px; margin-top: 50px; padding: 20px; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2, h3 { color: #fff; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #2563eb; outline: none; }
        button { width: 100%; padding: 12px; background: #2563eb; border: none; color: white; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 16px; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        .file-list { margin-top: 20px; border-top: 1px solid #333; }
        .file-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .file-item:hover { background: #252525; border-radius: 6px; }
        .file-item::after { content: '↗'; opacity: 0.5; }
        .status { font-size: 12px; color: #888; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="container">
    <div id="login-screen" class="card">
        <h2>Secure Access</h2>
        <input id="user" type="text" placeholder="Username" spellcheck="false">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="handleLogin()">Unlock Vault</button>
        <div id="login-status" class="status"></div>
    </div>

    <div id="main-screen" class="card" style="display:none">
        <h3>Your Secure Files</h3>
        <div id="file-list" class="file-list"></div>
        <button onclick="location.reload()" style="background:#333; margin-top:20px;">Lock & Logout</button>
    </div>
</div>

<script>
    // 1. CONFIGURATION
    const API = "https://1bc2-174-95-0-54.ngrok-free.app"; //     let sessionToken = null;

    // 2. API WRAPPER
    async function apiRequest(data) {
        try {
            const response = await fetch(API, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "ngrok-skip-browser-warning": "true" // Bypasses ngrok landing page
                },
                body: JSON.stringify(data)
            });
            return response;
        } catch (err) {
            console.error("Network Error:", err);
            return null;
        }
    }

    // 3. LOGIN LOGIC
    async function handleLogin() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pass").value;
        const status = document.getElementById("login-status");

        status.textContent = "Authenticating...";
        
        const res = await apiRequest({ action: "login", u, p });
        
        if (res && res.ok) {
            const data = await res.json();
            sessionToken = data.token;
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-screen").style.display = "block";
            loadFiles();
        } else {
            status.textContent = "Invalid credentials or server offline.";
            status.style.color = "#ff4444";
        }
    }

    // 4. LOAD FILE LIST
    async function loadFiles() {
        const res = await apiRequest({ action: "list", token: sessionToken });
        if (!res || !res.ok) return;

        const data = await res.json();
        const listDiv = document.getElementById("file-list");
        listDiv.innerHTML = "";
        
        data.files.forEach(name => {
            const el = document.createElement("div");
            el.className = "file-item";
            el.textContent = name;
            el.onclick = () => openSecureFile(name);
            listDiv.appendChild(el);
        });
    }

    // 5. RENDER FILE AS HTML IN NEW TAB
    async function openSecureFile(name) {
        const res = await apiRequest({ action: "file", token: sessionToken, name });
        
        if (res && res.ok) {
            const data = await res.json();
            
            // This creates a virtual HTML file in the browser's memory
            const blob = new Blob([data.content], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            
            // Open in new tab
            const newWindow = window.open(blobUrl, '_blank');
            
            // Revoke URL after a delay to free up browser memory
            if (newWindow) {
                setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
            }
        } else {
            alert("Error: Could not retrieve file content.");
        }
    }
</script>

</body>
</html>
