<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Private Portal</title>
    <style>
        body { background: #121212; color: #eee; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        form { border: 1px solid #333; padding: 2rem; border-radius: 8px; background: #1e1e1e; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; border: none; color: white; cursor: pointer; border-radius: 4px; }
        #content { margin-top: 20px; }
    </style>
</head>
<body>
    <div id="login-box">
        <form id="loginForm">
            <input type="text" id="user" placeholder="Username" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit">Access</button>
        </form>
        <div id="content"></div>
    </div>

    <script>
        const API_URL = " https://1bc2-174-95-0-54.ngrok-free.app";
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    u: document.getElementById('user').value,
                    p: document.getElementById('pass').value
                })
            });
            const data = await res.text();
            if (res.status === 200) {
                document.body.innerHTML = data; // Directly inject the received HTML files/list
            } else {
                alert("Access Denied");
            }
        };
    </script>
</body>
</html>
