<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Vault</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; margin: 0; }
        #container { width: 100%; max-width: 500px; margin-top: 50px; padding: 20px; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 8px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2563eb; border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        .file-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .file-item:hover { background: #252525; }
        #content-area { white-space: pre-wrap; background: #000; padding: 15px; border-radius: 4px; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div id="container">
    <div id="login-screen" class="card">
        <h2>Identity Verification</h2>
        <input id="user" type="text" placeholder="Username" autocomplete="username">
        <input id="pass" type="password" placeholder="Password" autocomplete="current-password">
        <button onclick="handleLogin()">Access Vault</button>
    </div>

    <div id="main-screen" class="card" style="display:none">
        <h3>Secure Files</h3>
        <div id="file-list"></div>
        <div id="viewer" style="display:none">
            <button onclick="showList()" style="background:#444; margin-bottom:10px;">&larr; Back to List</button>
            <div id="content-area"></div>
        </div>
    </div>
</div>

<script>
    const API = "https://1bc2-174-95-0-54.ngrok-free.app";
    let sessionToken = null;

    async function apiRequest(data) {
        const response = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });
        return response;
    }

    async function handleLogin() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pass").value;
        
        const res = await apiRequest({ action: "login", u, p });
        if (res.ok) {
            const data = await res.json();
            sessionToken = data.token;
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-screen").style.display = "block";
            loadFiles();
        } else {
            alert("Access Denied");
        }
    }

    async function loadFiles() {
        const res = await apiRequest({ action: "list", token: sessionToken });
        const data = await res.json();
        const listDiv = document.getElementById("file-list");
        listDiv.innerHTML = "";
        
        data.files.forEach(name => {
            const el = document.createElement("div");
            el.className = "file-item";
            el.textContent = name; // Secure against XSS
            el.onclick = () => viewFile(name);
            listDiv.appendChild(el);
        });
    }

    async function viewFile(name) {
        const res = await apiRequest({ action: "file", token: sessionToken, name });
        const data = await res.json();
        document.getElementById("file-list").style.display = "none";
        document.getElementById("viewer").style.display = "block";
        document.getElementById("content-area").textContent = data.content;
    }

    function showList() {
        document.getElementById("viewer").style.display = "none";
        document.getElementById("file-list").style.display = "block";
    }
</script>
</body>
</html>
